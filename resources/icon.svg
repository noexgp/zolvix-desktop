<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="zgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e42"/>
      <stop offset="100%" style="stop-color:#e07020"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle top shine -->
  <rect width="512" height="256" rx="112" ry="112" fill="white" opacity="0.03"/>

  <!-- Bold Z shape -->
  <!-- Top bar -->
  <rect x="112" y="120" width="288" height="52" rx="10" fill="url(#zgrad)"/>
  <!-- Bottom bar -->
  <rect x="112" y="340" width="288" height="52" rx="10" fill="url(#zgrad)"/>
  <!-- Diagonal stroke (Z crossbar) -->
  <polygon
    points="365,172  400,172  147,340  112,340"
    fill="url(#zgrad)"
  />

  <!-- Accent dot — bottom right corner of Z -->
  <circle cx="370" cy="392" r="22" fill="#f59e42" opacity="0.7"/>
</svg>
